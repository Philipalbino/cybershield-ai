<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CyberShield AI</title>

<meta name="google-site-verification" content="pkHP5SkQD7oJWhudXCQNCnq7YB-AzuLi9NWGarBra3I" />

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
}

body{
height:100vh;
display:flex;
flex-direction:column;
background:#ffffff;
color:#111;
}

/* Header */
.header{
display:flex;
justify-content:space-between;
align-items:center;
padding:18px 24%;
border-bottom:1px solid #eee;
background:#fff;
font-weight:500;
}

/* Clear button */
.clear-btn{
text-decoration:none;
color:#666;
font-size:14px;
padding:6px 12px;
border-radius:8px;
background:#f3f3f3;
}

.clear-btn:hover{
background:#e6e6e6;
}

/* Chat area */
.chat-box{
flex:1;
overflow-y:auto;
padding:40px 24%;
}

/* Messages */
.message{
padding:18px 22px;
margin-bottom:28px;
max-width:760px;
border-radius:14px;
line-height:1.8;
font-size:16px;
}

.user{
background:#e9e9eb;
margin-left:auto;
}

.bot{
background:#f7f7f8;
}

/* Input area */
.input-area{
display:flex;
padding:20px 24%;
border-top:1px solid #e5e5e5;
background:white;
gap:10px;
}

#user-input{
flex:1;
padding:14px;
border-radius:10px;
border:1px solid #ddd;
font-size:16px;
outline:none;
}

button{
padding:12px 20px;
border:none;
border-radius:10px;
cursor:pointer;
font-size:15px;
background:#f0f0f0;
}

button:hover{
background:#e2e2e2;
}
</style>
</head>

<body>

<!-- Header -->
<div class="header">
<div>CyberShield AI</div>
<a href="/clear" class="clear-btn">Clear Chat</a>
</div>

<!-- Chat -->
<div class="chat-box" id="chat-box">
<div class="message bot">
Hello 👋 I'm CyberShield AI. Ask me anything about cybersecurity.
</div>
</div>

<!-- Input -->
<div class="input-area">
<input type="text" id="user-input" placeholder="Message CyberShield AI..." />
<button onclick="startMic()">🎤</button>
<button onclick="sendMessage()">Send</button>
</div>

<script>
const input = document.getElementById("user-input");

input.addEventListener("keypress", function(e){
if(e.key === "Enter"){
sendMessage();
}
});

function sendMessage(){
let text = input.value.trim();
if(!text) return;

let box = document.getElementById("chat-box");

box.innerHTML += `<div class="message user">${text}</div>`;
input.value = "";

box.innerHTML += `<div class="message bot" id="typing">Thinking...</div>`;
box.scrollTop = box.scrollHeight;

fetch("/chat",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({message:text})
})
.then(res => res.json())
.then(data=>{
document.getElementById("typing").innerHTML = marked.parse(data.reply);
box.scrollTop = box.scrollHeight;
})
.catch(()=>{
document.getElementById("typing").innerText = "⚠️ AI connection error.";
});
}

function startMic() {
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

    if (!SpeechRecognition) {
        alert("Microphone not supported in this browser. Use Google Chrome.");
        return;
    }

    const recognition = new SpeechRecognition();
    recognition.lang = "en-US";
    recognition.interimResults = false;

    recognition.start();

    recognition.onstart = function () {
        console.log("Mic started...");
    };

    recognition.onresult = function (event) {
        const transcript = event.results[0][0].transcript;
        document.getElementById("user-input").value = transcript;
        sendMessage();
    };

    recognition.onerror = function (event) {
        console.error("Mic error:", event.error);
    };
}

</script>

</body>
</html>
