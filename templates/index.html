*{

box-sizing:border-box;

}

body{
display:flex;
height:100vh;

}

/* SIDEBAR */
.sidebar{
width:260px;
background:#202123;
padding:20px;
display:flex;
flex-direction:column;

}

.sidebar h2{

}

.sidebar a{

}

}

/* CHAT AREA */

.chat-wrapper{
flex:1;
display:flex;
flex-direction:column;
}

.chat-box{
flex:1;
overflow-y:auto;
padding:40px 15%;
display:flex;
flex-direction:column;
}

/* MESSAGE */

.message-row{
display:flex;
margin-bottom:20px;
}

.user-row{
justify-content:flex-end;
}

.message{
padding:14px 18px;
border-radius:8px;
max-width:70%;
line-height:1.6;
font-size:15px;
}

.user{
background:#10a37f;
color:white;
}

.bot{
background:#444654;
}

/* INPUT */

.input-area{
background:#40414f;
padding:20px 15%;
display:flex;
}

.input-area input{
flex:1;
padding:14px;
border:none;
border-radius:8px;
outline:none;
font-size:15px;
background:#343541;
color:white;
}

.input-area button{
margin-left:10px;
padding:14px 22px;
border:none;
border-radius:8px;
background:#10a37f;
color:white;
font-weight:bold;
cursor:pointer;
}

.input-area button:hover{
background:#0e8e6f;
}

</style>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
<div>
<h2>CyberShield AI</h2>
<a href="/login">Login</a>
<a href="/register">Register</a>
<a href="/about">About</a>
<a href="/services">Services</a>
<a href="/blog">Blog</a>
<a href="/contact">Contact</a>
</div>
</div>

<!-- CHAT AREA -->
<div class="chat-wrapper">

<div class="chat-box" id="chat-box">
<div class="message-row">
<div class="message bot">
Hello 👋 I'm CyberShield AI. Ask me anything about cybersecurity.
</div>
</div>
</div>

<div class="input-area">
<input type="text" id="user-input" placeholder="Message CyberShield AI..." />
<button onclick="sendMessage()">Send</button>
</div>

</div>

<script>

function sendMessage(){

let input=document.getElementById("user-input");
let text=input.value.trim();

if(text==="") return;

let chatBox=document.getElementById("chat-box");

let userRow=document.createElement("div");
userRow.className="message-row user-row";

let userMsg=document.createElement("div");
userMsg.className="message user";
userMsg.textContent=text;

userRow.appendChild(userMsg);
chatBox.appendChild(userRow);

input.value="";
chatBox.scrollTop=chatBox.scrollHeight;

setTimeout(()=>{

let botRow=document.createElement("div");
botRow.className="message-row";

let botMsg=document.createElement("div");
botMsg.className="message bot";
botMsg.textContent="Analyzing security query... 🔐";

botRow.appendChild(botMsg);
chatBox.appendChild(botRow);

chatBox.scrollTop=chatBox.scrollHeight;

},600);

}

</script>

</body>
